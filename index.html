<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杀戮尖塔2 - 故障机器人卡牌搭配助手</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --bg-panel: #212121;
            --bg-hover: #2a2a2a;
            --border: #333;
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #4fc3f7;
            --gold: #d4a843;
            --win-high: #4caf50;
            --win-mid: #ff9800;
            --win-low: #f44336;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            height: 100vh; overflow: hidden;
        }
        .app { display:flex; height:100vh; }

        .sidebar {
            width: 580px; background: var(--bg-panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .sidebar-header h2 { font-size: 1.15em; font-weight: 600; color: var(--text); margin-bottom: 8px; }
        .sidebar-header h2 span { color: var(--accent); }
        .filter-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
        .filter-chip {
            padding: 5px 12px; background: #2a2a2a; border: 1px solid #333; border-radius: 14px;
            color: #aaa; font-size: 0.74em; cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .filter-chip:hover { border-color: #555; color: #ddd; }
        .filter-chip.active { background: #333; border-color: var(--accent); color: var(--accent); }
        .search-box {
            margin-top: 8px; width: 100%; padding: 9px 14px; background: #2a2a2a;
            border: 1px solid #333; border-radius: 8px; color: var(--text); font-size: 0.84em; outline: none;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: #555; }

        .card-grid {
            flex: 1; overflow-y: auto; padding: 12px;
            display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start;
        }
        .card-grid::-webkit-scrollbar { width: 5px; }
        .card-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .mini-card {
            width: 140px; height: 187px; border-radius: 10px; cursor: pointer;
            transition: all 0.15s; position: relative; overflow: hidden;
            border: 2px solid #333; background: #2a2a2a; flex-shrink: 0;
        }
        .mini-card:hover { border-color: var(--accent); transform: scale(1.04); z-index: 2; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .mini-card .card-emoji {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3.5em;
        }
        .mini-card .card-cost-mini {
            position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; border-radius: 50%;
            background: rgba(0,0,0,0.85); color: #fff; font-size: 0.65em; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .mini-card .card-count-badge {
            position: absolute; top: 4px; right: 4px; background: var(--accent); color: #000;
            font-size: 0.62em; font-weight: bold; padding: 2px 6px; border-radius: 8px; display: none;
        }
        .mini-card .card-count-badge.show { display: block; }
        .mini-card .card-type-stripe { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; }

        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .hand-zone { padding: 14px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .hand-zone-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .hand-zone-header h3 { font-size: 0.9em; color: var(--text-dim); font-weight: 500; }
        .hand-zone-header h3 span { color: var(--accent); font-weight: 600; font-size: 1.05em; }
        .hand-zone-btns { display: flex; gap: 6px; }
        .btn-reset, .btn-clear {
            padding: 5px 14px; background: transparent; border: 1px solid #444;
            border-radius: 6px; color: #888; font-size: 0.74em; cursor: pointer; transition: all 0.15s;
        }
        .btn-reset:hover { border-color: var(--accent); color: var(--accent); }
        .btn-clear:hover { border-color: #f44; color: #f44; }
        .hand-cards {
            display: flex; gap: 10px; flex-wrap: wrap; min-height: 80px; align-items: flex-start;
            max-height: 200px; overflow-y: auto;
        }
        .hand-cards::-webkit-scrollbar { width: 3px; }
        .hand-cards::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .hand-card {
            width: 85px; height: 113px; border-radius: 8px; position: relative; cursor: default;
            border: 2px solid #444; background: #2a2a2a; flex-shrink: 0; transition: all 0.15s;
        }
        .hand-card:hover { border-color: #666; }
        .hand-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .hand-card .card-emoji {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.2em;
        }
        .hand-card .hand-card-count {
            position: absolute; top: -7px; left: -7px; background: var(--accent); color: #000;
            font-size: 0.58em; font-weight: bold; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .hand-card-actions { position: absolute; top: -8px; right: -8px; display: flex; gap: 3px; }
        .hand-card-btn {
            width: 22px; height: 22px; border-radius: 50%; border: 1px solid #555;
            background: #2a2a2a; color: #ccc; font-size: 0.6em; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.15s;
        }
        .hand-card-btn:hover { border-color: #fff; color: #fff; background: #3a3a3a; }
        .hand-card-btn.remove:hover { border-color: #f44; color: #f44; background: #3a1a1a; }
        .hand-card .hand-card-name {
            position: absolute; bottom: 3px; left: 0; right: 0; text-align: center;
            font-size: 0.55em; color: #fff; background: rgba(0,0,0,0.75);
            padding: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .hand-empty { color: #444; font-size: 0.88em; padding: 20px; width: 100%; text-align: center; }

        .hand-analysis {
            margin-top: 10px; padding: 14px 18px; background: rgba(79,195,247,0.03);
            border-radius: 10px; border: 1px solid rgba(79,195,247,0.1);
            font-size: 0.78em; color: var(--text-dim); display: none;
        }
        .hand-analysis.show { display: block; }
        .deck-summary { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
        .deck-summary .big-rate { font-size: 2em; font-weight: 700; line-height: 1; }
        .deck-summary .big-rate.high { color: #4caf50; }
        .deck-summary .big-rate.mid { color: #ff9800; }
        .deck-summary .big-rate.low { color: #f44336; }
        .deck-summary .meta { font-size: 0.75em; color: var(--text-dim); }
        .radar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .radar-item { text-align: center; }
        .radar-label { font-size: 0.75em; color: var(--text-dim); margin-bottom: 4px; }
        .radar-bar-outer { height: 6px; background: #2a2a2a; border-radius: 3px; overflow: hidden; margin: 0 auto; width: 100%; max-width: 120px; }
        .radar-bar-inner { height: 100%; border-radius: 3px; transition: width 0.4s; }
        .radar-value { font-size: 0.8em; font-weight: 700; margin-top: 2px; }
        .analysis-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
        .analysis-item { display: flex; align-items: center; gap: 3px; }
        .analysis-value { font-weight: 700; font-size: 1.05em; color: #fff; }
        .analysis-value.high { color: var(--win-high); }
        .analysis-value.mid { color: var(--win-mid); }
        .analysis-value.low { color: var(--win-low); }
        .survival-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
        .survival-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.7em; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .survival-badge.safe { background: rgba(76,175,80,0.15); color: #4caf50; }
        .survival-badge.warn { background: rgba(255,152,0,0.15); color: #ff9800; }
        .survival-badge.danger { background: rgba(244,67,54,0.15); color: #f44336; }

        .recommend-zone { flex: 1; overflow-y: auto; padding: 16px 24px; }
        .recommend-zone::-webkit-scrollbar { width: 5px; }
        .recommend-zone::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .recommend-zone h3 { font-size: 0.95em; color: var(--text-dim); font-weight: 500; margin-bottom: 14px; }
        .recommend-zone h3 span { color: var(--accent); }
        .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
        .rec-card {
            background: var(--bg-panel); border: 1px solid var(--border); border-radius: 14px;
            padding: 16px; display: flex; gap: 16px; cursor: pointer; transition: all 0.15s; align-items: flex-start;
        }
        .rec-card:hover { border-color: var(--accent); background: #282828; }
        .rec-card.top { border-color: var(--gold); background: #252520; }
        .rec-card-img {
            width: 100px; height: 133px; border-radius: 10px; flex-shrink: 0;
            background: #2a2a2a; overflow: hidden; cursor: default;
        }
        .rec-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .rec-card-img .card-emoji {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3em;
        }
        .rec-card-info { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
        .rec-card-rank { font-size: 0.74em; color: var(--gold); font-weight: 600; }
        .rec-card-name { font-size: 1.15em; font-weight: 600; color: #fff; }
        .rec-card-synergy { display: flex; align-items: baseline; gap: 8px; }
        .rec-card-rate { font-size: 2.4em; font-weight: 700; line-height: 1; }
        .rec-card-rate.high { color: var(--win-high); }
        .rec-card-rate.mid { color: var(--win-mid); }
        .rec-card-rate.low { color: var(--win-low); }
        .rec-card-rate-label { font-size: 0.78em; color: var(--text-dim); }
        .rec-card-detail { display: flex; gap: 12px; font-size: 0.74em; color: var(--text-dim); flex-wrap: wrap; }
        .rec-card-detail strong { color: #ddd; }
        .rec-card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .rec-tag { font-size: 0.66em; padding: 3px 7px; border-radius: 4px; background: rgba(79,195,247,0.1); color: var(--accent); border: 1px solid rgba(79,195,247,0.2); }

        /* 悬停预览 */
        .card-preview {
            display: none; position: fixed; z-index: 9999; pointer-events: none;
            width: 240px; height: 320px; border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            border: 3px solid var(--gold); overflow: hidden; background: #1a1a1a;
        }
        .card-preview img { width: 100%; height: 100%; object-fit: cover; }
        .card-preview .preview-emoji {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5em;
        }

        .toast {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            background:#333; color:#fff; padding:10px 24px; border-radius:8px;
            font-size:0.85em; z-index:999; opacity:1; transition:opacity 0.3s; pointer-events:none;
        }

        @media (max-width: 1100px) {
            .app { flex-direction: column; }
            .sidebar { width: 100%; max-height: 45vh; }
            .mini-card { width: 110px; height: 147px; }
            .hand-cards { max-height: 180px; }
            .rec-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><span>鸡煲</span> 卡牌池</h2>
                <div class="filter-row" id="filterRarity">
                    <button class="filter-chip active" data-rarity="all">全部</button>
                    <button class="filter-chip" data-rarity="common">普通</button>
                    <button class="filter-chip" data-rarity="uncommon">罕见</button>
                    <button class="filter-chip" data-rarity="rare">稀有</button>
                </div>
                <div class="filter-row" id="filterType">
                    <button class="filter-chip active" data-type="all">全部类型</button>
                    <button class="filter-chip" data-type="attack">攻击</button>
                    <button class="filter-chip" data-type="skill">技能</button>
                    <button class="filter-chip" data-type="power">能力</button>
                </div>
                <input type="text" class="search-box" id="searchInput" placeholder="搜索卡牌...">
            </div>
            <div class="card-grid" id="cardPool"></div>
        </div>

        <div class="main-area">
            <div class="hand-zone">
                <div class="hand-zone-header">
                    <h3>我的牌库 <span id="selectedCount">0</span>/40</h3>
                    <div class="hand-zone-btns">
                        <button class="btn-reset" id="resetBtn">恢复初始</button>
                        <button class="btn-clear" id="clearBtn">清空</button>
                    </div>
                </div>
                <div class="hand-cards" id="selectedCards">
                    <div class="hand-empty">初始牌库已加载，点击左侧卡牌继续添加</div>
                </div>
                <div class="hand-analysis" id="handAnalysis"></div>
            </div>

            <div class="recommend-zone">
                <h3>最佳搭配推荐 <span id="recCount"></span></h3>
                <div class="rec-grid" id="recommendResult">
                    <div class="hand-empty" style="grid-column:1/-1;">选择卡牌后显示推荐</div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
